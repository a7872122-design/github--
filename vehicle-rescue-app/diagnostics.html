<!DOCTYPE html>
<html>
<head>
  <title>系統診斷</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
    .ok { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
    h2 { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>🔍 車輛救援 App - 診斷</h1>
  
  <h2>伺服器狀態</h2>
  <div id="backend" class="status"></div>
  <div id="frontend" class="status"></div>
  <div id="websocket" class="status"></div>
  
  <h2>環境檢查</h2>
  <div id="env" class="status"></div>
  
  <h2>API 測試</h2>
  <div id="api-location" class="status"></div>
  <div id="api-repairs" class="status"></div>
  
  <script>
    // 檢查後端
    fetch('http://localhost:3001/api/location')
      .then(r => {
        document.getElementById('backend').innerHTML = '✅ 後端 (3001): ' + r.status;
        document.getElementById('backend').className = 'status ok';
        return r.json();
      })
      .then(d => {
        document.getElementById('api-location').innerHTML = '✅ /api/location: ' + JSON.stringify(d);
        document.getElementById('api-location').className = 'status ok';
      })
      .catch(e => {
        document.getElementById('backend').innerHTML = '❌ 後端連接失敗: ' + e.message;
        document.getElementById('backend').className = 'status error';
      });
    
    // 檢查前端
    fetch('http://localhost:5173')
      .then(r => {
        document.getElementById('frontend').innerHTML = '✅ 前端 (5173): ' + r.status;
        document.getElementById('frontend').className = 'status ok';
      })
      .catch(e => {
        document.getElementById('frontend').innerHTML = '❌ 前端連接失敗: ' + e.message;
        document.getElementById('frontend').className = 'status error';
      });
    
    // 檢查 WebSocket
    const ws = new WebSocket('ws://localhost:3001');
    ws.onopen = () => {
      document.getElementById('websocket').innerHTML = '✅ WebSocket 連接成功';
      document.getElementById('websocket').className = 'status ok';
      ws.close();
    };
    ws.onerror = (e) => {
      document.getElementById('websocket').innerHTML = '❌ WebSocket 連接失敗';
      document.getElementById('websocket').className = 'status error';
    };
    
    // API 測試
    setTimeout(() => {
      fetch('http://localhost:3001/api/repairs?lat=25.03&lng=121.56')
        .then(r => r.json())
        .then(d => {
          document.getElementById('api-repairs').innerHTML = '✅ /api/repairs: ' + d.length + ' 家廠商';
          document.getElementById('api-repairs').className = 'status ok';
        })
        .catch(e => {
          document.getElementById('api-repairs').innerHTML = '❌ /api/repairs: ' + e.message;
          document.getElementById('api-repairs').className = 'status error';
        });
    }, 500);
    
    // 環境檢查
    document.getElementById('env').innerHTML = '當前 URL: ' + window.location.href;
  </script>
</body>
</html>
